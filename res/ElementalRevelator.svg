<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="213.36mm" height="128.5mm" viewBox="0 0 213.36 128.5">
  <!-- Panel background -->
  <rect x="0" y="0" width="213.36" height="128.5" fill="#000000"/>

  <!-- Header divider: hairlines fading outward from the chamber glyph -->
