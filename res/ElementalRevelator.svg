    <line x1="63.44" y1="85.42" x2="57.62" y2="89.65"/>
  </g>
  <line x1="46.93" y1="77.31" x2="41.10" y2="73.08" stroke="#000000" stroke-width="2.80"/>
  <g stroke="#ffc464" stroke-width="0.5" stroke-opacity="0.9">
    <line x1="47.46" y1="76.58" x2="41.63" y2="72.35"/>
    <line x1="46.40" y1="78.04" x2="40.57" y2="73.81"/>
  </g>
  <line x1="49.01" y1="59.83" x2="51.23" y2="52.98" stroke="#000000" stroke-width="2.80"/>
