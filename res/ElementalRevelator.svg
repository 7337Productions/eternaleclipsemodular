    <line x1="48.15" y1="59.55" x2="50.38" y2="52.70"/>
  </g>
  <line x1="66.28" y1="56.40" x2="73.48" y2="56.40" stroke="#000000" stroke-width="2.80"/>
  <g stroke="#ffc464" stroke-width="0.5" stroke-opacity="0.9">
    <line x1="66.28" y1="57.30" x2="73.48" y2="57.30"/>
    <line x1="66.28" y1="55.50" x2="73.48" y2="55.50"/>
  </g>

  <!-- Inner circle around the SPIRIT latch -->
  <circle cx="60" cy="70" r="9" fill="none" stroke="#6b4522" stroke-width="0.65" stroke-opacity="0.9"/>

  <!-- Abyssal Harmonics seal around the DAEMON knob: bold outer ring,
       thin inner ring, in the label's stamp red -->
  <g fill="none" stroke="#ff0000" stroke-opacity="0.9">
    <circle cx="60" cy="114" r="6.5" stroke-width="0.5"/>
    <circle cx="60" cy="114" r="5.6" stroke-width="0.25"/>
  </g>

  <!-- Element glyphs, white, each inside its triangular pentagram arm -->
  <g stroke="#ffeeb8" stroke-width="0.3" stroke-opacity="0.8" fill="none">
    <!-- Spirit: circle, top arm -->
    <circle cx="60" cy="46.27" r="2"/>
    <!-- Air: upward triangle, barred -->
    <path d="M 37.43 60.27 L 34.93 64.57 L 39.93 64.57 Z"/>
    <line x1="35.83" y1="63.07" x2="39.03" y2="63.07"/>
    <!-- Water: downward triangle -->
    <path d="M 82.57 65.07 L 80.07 60.77 L 85.07 60.77 Z"/>
    <!-- Earth: downward triangle, barred -->
    <path d="M 46.05 91.60 L 43.55 87.30 L 48.55 87.30 Z"/>
    <line x1="44.45" y1="88.80" x2="47.65" y2="88.80"/>
    <!-- Fire: upward triangle -->
    <path d="M 73.95 86.80 L 71.45 91.10 L 76.45 91.10 Z"/>
  </g>

  <!-- Filter/FX column constellation -->
  <g stroke="#6b4522" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="139.5" y1="50" x2="139.5" y2="70"/>
    <line x1="139.5" y1="92" x2="131" y2="110"/>
    <line x1="139.5" y1="92" x2="148" y2="110"/>
  </g>

  <!-- Patch bay output separator -->
  <line x1="163" y1="109.2" x2="207.9" y2="109.2" stroke="#382110" stroke-width="0.4"/>

  <!-- Corner brackets (Church card motif) -->
  <g fill="none" stroke="#cd762b" stroke-width="0.4" stroke-opacity="0.9">
    <path d="M 121.5,20.4 L 121.5,18 L 123.9,18"/>
    <path d="M 157.5,120.5 L 157.5,122.9 L 155.1,122.9"/>
    <path d="M 161,20.4 L 161,18 L 163.4,18"/>
    <path d="M 209.9,120.5 L 209.9,122.9 L 207.5,122.9"/>
  </g>

