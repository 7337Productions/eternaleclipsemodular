    <line x1="4.00" y1="10.8" x2="20.58" y2="10.8" stroke-opacity="0.08"/>
    <line x1="20.58" y1="10.8" x2="37.16" y2="10.8" stroke-opacity="0.2"/>
    <line x1="37.16" y1="10.8" x2="53.74" y2="10.8" stroke-opacity="0.33"/>
    <line x1="53.74" y1="10.8" x2="70.32" y2="10.8" stroke-opacity="0.47"/>
    <line x1="70.32" y1="10.8" x2="86.90" y2="10.8" stroke-opacity="0.6"/>
    <line x1="86.90" y1="10.8" x2="103.48" y2="10.8" stroke-opacity="0.75"/>
    <line x1="109.88" y1="10.8" x2="126.46" y2="10.8" stroke-opacity="0.75"/>
    <line x1="126.46" y1="10.8" x2="143.04" y2="10.8" stroke-opacity="0.6"/>
    <line x1="143.04" y1="10.8" x2="159.62" y2="10.8" stroke-opacity="0.47"/>
    <line x1="159.62" y1="10.8" x2="176.20" y2="10.8" stroke-opacity="0.33"/>
    <line x1="176.20" y1="10.8" x2="192.78" y2="10.8" stroke-opacity="0.2"/>
    <line x1="192.78" y1="10.8" x2="209.36" y2="10.8" stroke-opacity="0.08"/>
  </g>
  <!-- Chamber glyph: triangle with base bar (the elements) -->
  <path d="M 106.68,9.55 L 107.93,11.75 L 105.43,11.75 Z M 104.98,11.75 L 108.38,11.75" fill="none" stroke="#ffc464" stroke-width="0.3" stroke-opacity="0.9"/>

  <!-- Section frames (filter/FX column and patch bay only; the pentagram
       floats free like Cosmic Clock's wheel) -->
  <rect x="121.5" y="18" width="36" height="104.9" rx="2" fill="#140c06" stroke="#382110" stroke-width="0.4"/>
  <rect x="161" y="18" width="48.9" height="104.9" rx="2" fill="#140c06" stroke="#382110" stroke-width="0.4"/>

  <!-- Ring through all ten knob centers -->
  <circle cx="60" cy="70" r="44" fill="none" stroke="#cd762b" stroke-width="0.5" stroke-opacity="0.35"/>

  <!-- Modifier lines into the pentagram corners (drawn first so they
       tuck under the woven band), hairlines like the ring -->
  <g stroke="#cd762b" stroke-width="0.35" stroke-opacity="0.35">
    <line x1="85.86" y1="34.40" x2="70.58" y2="55.44"/>
    <line x1="101.85" y1="83.60" x2="77.12" y2="75.56"/>
    <line x1="60.00" y1="114.00" x2="60.00" y2="88.00"/>
    <line x1="18.15" y1="83.60" x2="42.88" y2="75.56"/>
    <line x1="34.14" y1="34.40" x2="49.42" y2="55.44"/>
  </g>

  <!-- Woven pentagram: double-line star ribbons, title gold -->
  <g stroke="#ffc464" stroke-width="0.5" stroke-opacity="0.9">
    <line x1="59.14" y1="26.28" x2="85.01" y2="105.87"/>
    <line x1="60.86" y1="25.72" x2="86.72" y2="105.32"/>
    <line x1="101.32" y1="55.68" x2="33.61" y2="104.87"/>
    <line x1="102.38" y1="57.13" x2="34.67" y2="106.32"/>
    <line x1="86.39" y1="104.87" x2="18.68" y2="55.68"/>
    <line x1="85.33" y1="106.32" x2="17.62" y2="57.13"/>
    <line x1="34.99" y1="105.87" x2="60.86" y2="26.28"/>
    <line x1="33.28" y1="105.32" x2="59.14" y2="25.72"/>
    <line x1="18.15" y1="57.30" x2="101.85" y2="57.30"/>
    <line x1="18.15" y1="55.50" x2="101.85" y2="55.50"/>
