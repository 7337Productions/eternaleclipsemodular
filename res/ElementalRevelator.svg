<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="213.36mm" height="128.5mm" viewBox="0 0 213.36 128.5">
  <!-- Panel background -->
  <rect x="0" y="0" width="213.36" height="128.5" fill="#131019"/>

  <!-- Accent line under the single centered header -->
  <line x1="4" y1="14" x2="209.36" y2="14" stroke="#e8a33d" stroke-width="0.35" stroke-opacity="0.6"/>

  <!-- Section frames (filter/FX column and patch bay only; the pentagram
       floats free like Cosmic Clock's wheel) -->
  <rect x="121.5" y="18" width="36" height="104.9" rx="2" fill="#181420" stroke="#2c2438" stroke-width="0.4"/>
  <rect x="161" y="18" width="48.9" height="104.9" rx="2" fill="#181420" stroke="#2c2438" stroke-width="0.4"/>

  <!-- Ring through all ten knob centers -->
  <circle cx="60" cy="70" r="44" fill="none" stroke="#e8a33d" stroke-width="0.35" stroke-opacity="0.35"/>

  <!-- Modifier lines into the pentagram corners (drawn first so they
       tuck under the woven band) -->
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="85.86" y1="34.40" x2="70.58" y2="55.44"/>
    <line x1="101.85" y1="83.60" x2="77.12" y2="75.56"/>
    <line x1="60.00" y1="114.00" x2="60.00" y2="88.00"/>
    <line x1="18.15" y1="83.60" x2="42.88" y2="75.56"/>
    <line x1="34.14" y1="34.40" x2="49.42" y2="55.44"/>
  </g>

  <!-- Woven pentagram: double-line star ribbons -->
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="59.14" y1="26.28" x2="85.01" y2="105.87"/>
    <line x1="60.86" y1="25.72" x2="86.72" y2="105.32"/>
    <line x1="101.32" y1="55.68" x2="33.61" y2="104.87"/>
    <line x1="102.38" y1="57.13" x2="34.67" y2="106.32"/>
    <line x1="86.39" y1="104.87" x2="18.68" y2="55.68"/>
    <line x1="85.33" y1="106.32" x2="17.62" y2="57.13"/>
    <line x1="34.99" y1="105.87" x2="60.86" y2="26.28"/>
    <line x1="33.28" y1="105.32" x2="59.14" y2="25.72"/>
    <line x1="18.15" y1="57.30" x2="101.85" y2="57.30"/>
    <line x1="18.15" y1="55.50" x2="101.85" y2="55.50"/>
  </g>
  <!-- Over/under weave at the five inner corners -->
  <line x1="74.87" y1="71.77" x2="77.10" y2="78.62" stroke="#131019" stroke-width="2.80"/>
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="74.02" y1="72.05" x2="76.24" y2="78.90"/>
    <line x1="75.73" y1="71.49" x2="77.95" y2="78.34"/>
  </g>
  <line x1="62.91" y1="84.69" x2="57.09" y2="88.92" stroke="#131019" stroke-width="2.80"/>
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="62.38" y1="83.96" x2="56.56" y2="88.19"/>
    <line x1="63.44" y1="85.42" x2="57.62" y2="89.65"/>
  </g>
  <line x1="46.93" y1="77.31" x2="41.10" y2="73.08" stroke="#131019" stroke-width="2.80"/>
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="47.46" y1="76.58" x2="41.63" y2="72.35"/>
    <line x1="46.40" y1="78.04" x2="40.57" y2="73.81"/>
  </g>
  <line x1="49.01" y1="59.83" x2="51.23" y2="52.98" stroke="#131019" stroke-width="2.80"/>
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="49.86" y1="60.11" x2="52.09" y2="53.26"/>
    <line x1="48.15" y1="59.55" x2="50.38" y2="52.70"/>
  </g>
  <line x1="66.28" y1="56.40" x2="73.48" y2="56.40" stroke="#131019" stroke-width="2.80"/>
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="66.28" y1="57.30" x2="73.48" y2="57.30"/>
    <line x1="66.28" y1="55.50" x2="73.48" y2="55.50"/>
  </g>

  <!-- Inner circle around the SPIRIT latch -->
  <circle cx="60" cy="70" r="9" fill="none" stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9"/>

  <!-- Element glyphs: circle for spirit, alchemical triangles for the four -->
  <g stroke="#e8a33d" stroke-width="0.3" stroke-opacity="0.45" fill="none">
    <!-- Spirit: circle -->
    <circle cx="60" cy="17.2" r="2"/>
    <!-- Air: upward triangle, barred -->
    <path d="M 7.5 43.9 L 5 48.2 L 10 48.2 Z"/>
    <line x1="5.9" y1="46.7" x2="9.1" y2="46.7"/>
    <!-- Water: downward triangle -->
    <path d="M 112.5 48.2 L 110 43.9 L 115 43.9 Z"/>
    <!-- Earth: downward triangle, barred -->
    <path d="M 21 102.2 L 18.5 97.9 L 23.5 97.9 Z"/>
    <line x1="19.4" y1="99.4" x2="22.6" y2="99.4"/>
    <!-- Fire: upward triangle -->
    <path d="M 99 97.9 L 96.5 102.2 L 101.5 102.2 Z"/>
  </g>

  <!-- Filter/FX column constellation -->
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="139.5" y1="50" x2="139.5" y2="70"/>
    <line x1="139.5" y1="92" x2="131" y2="110"/>
    <line x1="139.5" y1="92" x2="148" y2="110"/>
  </g>

  <!-- Patch bay output separator -->
  <line x1="163" y1="107" x2="207.9" y2="107" stroke="#2c2438" stroke-width="0.4"/>
</svg>
