<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40.64mm" height="128.5mm" viewBox="0 0 40.64 128.5">
  <!-- Panel background -->
  <rect x="0" y="0" width="40.64" height="128.5" fill="#0c0604"/>

  <!-- Header divider: hairlines fading outward from the chamber glyph -->
  <g stroke="#cd762b" stroke-width="0.3">
    <line x1="6.00" y1="14" x2="7.85" y2="14" stroke-opacity="0.08"/>
    <line x1="7.85" y1="14" x2="9.71" y2="14" stroke-opacity="0.2"/>
    <line x1="9.71" y1="14" x2="11.56" y2="14" stroke-opacity="0.33"/>
    <line x1="11.56" y1="14" x2="13.41" y2="14" stroke-opacity="0.47"/>
    <line x1="13.41" y1="14" x2="15.27" y2="14" stroke-opacity="0.6"/>
    <line x1="15.27" y1="14" x2="17.12" y2="14" stroke-opacity="0.75"/>
    <line x1="23.52" y1="14" x2="25.37" y2="14" stroke-opacity="0.75"/>
    <line x1="25.37" y1="14" x2="27.23" y2="14" stroke-opacity="0.6"/>
    <line x1="27.23" y1="14" x2="29.08" y2="14" stroke-opacity="0.47"/>
    <line x1="29.08" y1="14" x2="30.93" y2="14" stroke-opacity="0.33"/>
    <line x1="30.93" y1="14" x2="32.79" y2="14" stroke-opacity="0.2"/>
    <line x1="32.79" y1="14" x2="34.64" y2="14" stroke-opacity="0.08"/>
  </g>
  <!-- Chamber glyph: half-disc (the phase) -->
  <circle cx="20.32" cy="14" r="1.25" fill="none" stroke="#ffc464" stroke-width="0.3" stroke-opacity="0.9"/>
  <path d="M 20.32,12.75 A 1.25,1.25 0 0 0 20.32,15.25 Z" fill="#ffc464" fill-opacity="0.9"/>

  <!-- Display well behind the moon -->
  <circle cx="20.32" cy="31" r="13.2" fill="#070302" stroke="#382110" stroke-width="0.4"/>

  <!-- Section frames -->
  <!-- Controls -->
  <rect x="2.5" y="49.5" width="35.64" height="36.5" rx="2" fill="#140c06" stroke="#382110" stroke-width="0.4"/>
  <!-- CV / IO area -->
  <rect x="2.5" y="87" width="35.64" height="35.9" rx="2" fill="#0a0503" stroke="#382110" stroke-width="0.4"/>

  <!-- Corner brackets (Church card motif) -->
  <g fill="none" stroke="#cd762b" stroke-width="0.4" stroke-opacity="0.9">
    <path d="M 2.5,51.9 L 2.5,49.5 L 4.9,49.5"/>
    <path d="M 38.14,83.6 L 38.14,86 L 35.74,86"/>
    <path d="M 2.5,89.4 L 2.5,87 L 4.9,87"/>
    <path d="M 38.14,120.5 L 38.14,122.9 L 35.74,122.9"/>
  </g>

  <!-- Brand mark (sigil only at 8HP), flush to the bottom edge -->
  <circle cx="20.32" cy="126.5" r="1.3" fill="none" stroke="#ffc464" stroke-width="0.3" stroke-opacity="0.9"/>
  <circle cx="20.32" cy="126.5" r="0.33" fill="#cd762b"/>
</svg>
