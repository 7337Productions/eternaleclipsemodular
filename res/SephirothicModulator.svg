<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="111.76mm" height="128.5mm" viewBox="0 0 111.76 128.5">
  <!-- Panel background -->
  <rect x="0" y="0" width="111.76" height="128.5" fill="#131019"/>

  <!-- Accent line under the single centered header -->
  <line x1="4" y1="14" x2="107.76" y2="14" stroke="#e8a33d" stroke-width="0.35" stroke-opacity="0.6"/>

  <!-- Da'at matrix frame -->
  <rect x="67" y="18" width="43" height="104.5" rx="2" fill="#181420" stroke="#2c2438" stroke-width="0.4"/>

  <!-- The 22 paths (jack centers: K 32,24 / Ch 52,34 / B 12,34 / Cs 52,52 /
       G 12,52 / T 32,61 / N 52,79 / H 12,79 / Y 32,88 / M 32,102) -->
  <g stroke="#4c4170" stroke-width="0.65" stroke-opacity="0.9">
    <line x1="32" y1="24" x2="52" y2="34"/>
    <line x1="32" y1="24" x2="12" y2="34"/>
    <line x1="32" y1="24" x2="32" y2="61"/>
    <line x1="52" y1="34" x2="12" y2="34"/>
    <line x1="52" y1="34" x2="32" y2="61"/>
    <line x1="52" y1="34" x2="52" y2="52"/>
    <line x1="12" y1="34" x2="32" y2="61"/>
    <line x1="12" y1="34" x2="12" y2="52"/>
    <line x1="52" y1="52" x2="12" y2="52"/>
    <line x1="52" y1="52" x2="32" y2="61"/>
    <line x1="52" y1="52" x2="52" y2="79"/>
    <line x1="12" y1="52" x2="32" y2="61"/>
    <line x1="12" y1="52" x2="12" y2="79"/>
    <line x1="32" y1="61" x2="52" y2="79"/>
    <line x1="32" y1="61" x2="12" y2="79"/>
    <line x1="32" y1="61" x2="32" y2="88"/>
    <line x1="52" y1="79" x2="12" y2="79"/>
    <line x1="52" y1="79" x2="32" y2="88"/>
    <line x1="52" y1="79" x2="32" y2="102"/>
    <line x1="12" y1="79" x2="32" y2="88"/>
    <line x1="12" y1="79" x2="32" y2="102"/>
    <line x1="32" y1="88" x2="32" y2="102"/>
  </g>

  <!-- Sephirah circles -->
  <g fill="#0c0a11" stroke="#e8a33d" stroke-width="0.35" stroke-opacity="0.55">
    <circle cx="32" cy="24" r="5.4"/>
    <circle cx="52" cy="34" r="5.4"/>
    <circle cx="12" cy="34" r="5.4"/>
    <circle cx="52" cy="52" r="5.4"/>
    <circle cx="12" cy="52" r="5.4"/>
    <circle cx="32" cy="61" r="5.4"/>
    <circle cx="52" cy="79" r="5.4"/>
    <circle cx="12" cy="79" r="5.4"/>
    <circle cx="32" cy="88" r="5.4"/>
    <circle cx="32" cy="102" r="5.4"/>
  </g>

  <!-- Da'at: the hidden sephirah, gate into the matrix -->
  <circle cx="32" cy="42.5" r="4" fill="none" stroke="#a89fbf" stroke-width="0.35"
          stroke-opacity="0.6" stroke-dasharray="1.2 1.2"/>
  <line x1="36" y1="42.5" x2="67" y2="42.5" stroke="#a89fbf" stroke-width="0.35"
        stroke-opacity="0.4" stroke-dasharray="1.2 1.2"/>

  <!-- Ephemeris date window -->
  <rect x="28" y="111" width="34" height="8" rx="1" fill="#0c0a11" stroke="#e8a33d"
        stroke-width="0.35" stroke-opacity="0.6"/>
</svg>
